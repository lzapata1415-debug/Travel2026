<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madrid · Barcelona 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  /* 🇪🇸 COLORES BANDERA DE ESPAÑA Y FONDO BLANCO */
  --red:#AA151B; /* Rojo España */
  --red-soft:rgba(170,21,27,0.12);
  --gold:#F1BF00; /* Amarillo/Oro España */
  --gold-dark:#C49A00; 
  --gold-soft:rgba(241,191,0,0.15);
  
  --cream:#FFFFFF; /* Fondo Blanco Puro */
  --card:#FFFFFF; /* Tarjetas Blancas */
  
  --dark:#1A1208; /* Letras generales legibles */
  --dark2:#2D2010; 
  --dark3:#3D2E18;
  --muted:#8C7355; 
  --border:rgba(170,21,27,0.15); /* Bordes con un toque rojizo suave */
  --shadow:0 4px 20px rgba(0,0,0,0.06);
  --radius:16px; --tab-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}

/* ── HERO ── */
.hero{background:var(--dark);padding:24px 16px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--red) 50%,var(--gold) 50%)}
.hero::after{content:'España 2026';position:absolute;right:-20px;top:18px;font-family:'Playfair Display',serif;font-size:80px;font-weight:900;color:rgba(255,255,255,0.03);letter-spacing:-2px;pointer-events:none}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);font-weight:900;color:#fff;letter-spacing:-0.5px}
.hero h1 span{color:var(--gold)}
.hero-meta{color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.5px}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px}
.chip{background:rgba(241,191,0,0.1);border:1px solid rgba(241,191,0,0.25);border-radius:30px;padding:5px 12px;font-size:11px;color:var(--gold);font-family:'DM Mono',monospace}

/* ── TABS ── */
.tabs{display:flex;overflow-x:auto;background:var(--dark2);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:200;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{flex:0 0 auto;padding:0 16px;height:var(--tab-h);font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:all .2s;letter-spacing:.3px}
.tb.on{color:var(--gold);border-bottom-color:var(--gold)}
.tb:hover{color:#fff}

/* ── SECTIONS ── */
.sec{display:none;padding:18px 14px 90px;max-width:820px;margin:0 auto}
.sec.on{display:block}
.stitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:1px}

/* ── DAY CARDS ── */
.day{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.day:hover{box-shadow:0 6px 28px rgba(170,21,27,0.08)}
.dh{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;background:linear-gradient(135deg,var(--dark),var(--dark2));user-select:none}
.dnum{background:var(--gold);color:var(--dark);font-family:'Playfair Display',serif;font-weight:700;font-size:16px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.di{flex:1;min-width:0}
.ddate{color:var(--gold);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.dtitle{color:#fff;font-size:14px;font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbadge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.t-air{background:rgba(198,11,30,.2);color:#FF7B88}
.t-train{background:var(--gold-soft);color:var(--gold)}
.t-car{background:rgba(92,61,26,.35);color:#D4A96A}
.t-pub{background:rgba(255,255,255,.08);color:#aaa}
.dchev{color:var(--muted);font-size:11px;transition:transform .3s;flex-shrink:0}
.day.open .dchev{transform:rotate(180deg)}
.dbody{display:none;padding:14px}
.day.open .dbody{display:block}

/* ── ACTIVITIES ── */
.act{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.act:last-child{border-bottom:none}
.atime{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:44px;flex-shrink:0;padding-top:3px}
.acont{flex:1}
.atitle{font-size:13px;font-weight:700;line-height:1.3;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap; color:var(--dark)}
.anote{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.mrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.mb{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;text-decoration:none;transition:opacity .2s}
.mb:hover{opacity:.8}
.mb-r{background:var(--red);color:#fff}
.mb-g{background:var(--gold-dark);color:#fff}

/* edit inline */
.edit-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--muted);cursor:pointer;margin-left:4px;flex-shrink:0}
.edit-btn:hover{border-color:var(--gold);color:var(--gold)}
.inline-edit{width:100%;padding:5px 8px;border:1.5px solid var(--gold);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--dark);outline:none;margin-top:4px}
.save-btn{padding:4px 10px;background:var(--gold-dark);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-top:4px}
.add-act-btn{width:100%;padding:8px;background:transparent;border:1.5px dashed var(--border);border-radius:10px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .2s}
.add-act-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── INFO CARDS ── */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.igrid{grid-template-columns:1fr}}
.icard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.icard h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:6px; font-weight:900}
.irow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.irow:last-child{border-bottom:none}
.ilabel{color:var(--muted)}
.ival{font-weight:700;color:var(--dark);font-family:'DM Mono',monospace;font-size:11px}

/* ── EXPENSE / SPLITWISE ── */
.fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.fg input,.fg select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--dark);outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pb{padding:7px;border:2px solid var(--border);border-radius:10px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;color:var(--muted)}
.pb.sel{border-color:var(--gold);background:var(--gold-soft);color:var(--dark)}
.btn-p{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-p:hover{background:#8A1015}
.btn-s{padding:7px 14px;background:transparent;color:var(--red);border:1.5px solid var(--red);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s; width:100%; margin-top:8px;}
.btn-s:hover{background:var(--red);color:#fff}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;box-shadow:var(--shadow)}
.exp-l{flex:1}
.exp-name{font-size:12px;font-weight:700}
.exp-by{font-size:10px;color:var(--muted);margin-top:1px}
.exp-amt{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--red)}
.exp-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px;margin-left:6px}

/* ── DEBT SUMMARY ── */
.dsummary{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:var(--radius);padding:18px;margin-top:4px}
.dtitle-s{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:14px; font-weight:900}
.drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:12px}
.drow:last-child{border-bottom:none}
.dperson{color:#fff;font-weight:500}
.owes{color:#FF7B88}
.owed{color:#6EE7B7}

/* ── CHARTS ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:520px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.chart-card h4{font-family:'Playfair Display',serif;font-size:14px;color:var(--dark);margin-bottom:12px; font-weight:900}
.chart-wrap{position:relative;height:200px}

/* ── RESERVATIONS ── */
.res{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;overflow:hidden;padding-left:20px}
.res::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.res-r::before{background:var(--red)}
.res-g::before{background:var(--gold)}
.res-b::before{background:var(--dark3)}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.rtitle{font-family:'Playfair Display',serif;font-size:15px;font-weight:900; color:var(--dark)}
.rstatus{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;margin-left:8px}
.st-done{background:rgba(6,188,120,.15);color:#059669}
.st-pend{background:var(--gold-soft);color:var(--gold-dark)}
.st-todo{background:var(--red-soft);color:var(--red)}
.rdetail{font-size:12px;color:var(--muted);line-height:1.6}
.rprice{display:inline-block;margin-top:7px;font-family:'DM Mono',monospace;font-size:12px;background:var(--gold-soft);color:var(--gold-dark);padding:3px 8px;border-radius:6px; font-weight:bold}

/* tasks */
.task-list{list-style:none}
.task-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:7px;font-size:12px;cursor:pointer;transition:background .2s}
.task-item:hover{background:var(--gold-soft)}
.tcheck{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s}
.task-item.done .tcheck{background:#059669;border-color:#059669;color:#fff}
.task-item.done .tname{color:var(--muted);text-decoration:line-through}
.tname{flex:1; font-weight:600}
.towner{font-size:10px;color:var(--muted)}

/* ── BUDGET ── */
.btotal{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:var(--radius);padding:22px;margin-bottom:14px;text-align:center}
.blabel{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase; font-weight:bold}
.bamt{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:var(--gold)}
.bsub{color:rgba(255,255,255,.4);font-size:11px;margin-top:3px}
.bitem{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;box-shadow:var(--shadow)}
.bcat{display:flex;align-items:center;gap:9px}
.bicon{font-size:17px}
.bname{font-size:13px;font-weight:700}
.bval{font-family:'DM Mono',monospace;font-size:14px;font-weight:700; color:var(--red)}
.pbar{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--gold))}

/* ── AI CHAT ── */
.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--tab-h) - 200px);min-height:400px}
.ai-messages{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%;padding:11px 14px;border-radius:16px;font-size:13px;line-height:1.55;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{background:var(--dark);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-ai{background:var(--card);border:1px solid var(--border);color:var(--dark);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg-ai strong{color:var(--red)}
.ai-typing{display:none;align-self:flex-start;background:var(--card);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:11px 16px;box-shadow:var(--shadow)}
.dots{display:flex;gap:4px}
.dot{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ai-input-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.ai-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--dark);outline:none;transition:border-color .2s;resize:none}
.ai-input:focus{border-color:var(--gold)}
.ai-send{padding:11px 16px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;transition:background .2s;flex-shrink:0}
.ai-send:hover{background:#8A1015}
.ai-send:disabled{opacity:.5;cursor:not-allowed}
.quick-qs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.qq{padding:5px 11px;background:var(--gold-soft);border:1px solid var(--gold-soft);border-radius:20px;font-size:11px;font-weight:700;color:var(--gold-dark);cursor:pointer;transition:all .2s}
.qq:hover{background:var(--gold);color:var(--dark)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;border-left:4px solid var(--gold)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* traveler */
.tvcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;gap:12px}
.tvav{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.tvinfo{flex:1}
.tvname{font-size:15px;font-weight:900;margin-bottom:5px; color:var(--red)}
.tvrow{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
.tvrow strong{color:var(--dark);font-family:'DM Mono',monospace}

/* storage indicator */
.storage-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#059669;background:rgba(6,188,120,.1);border-radius:20px;padding:3px 9px;margin-left:8px;font-weight:700}
.storage-dot{width:6px;height:6px;background:#059669;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="hero">
  <h1>Madrid · <span>Barcelona</span></h1>
  <div style="font-family:'Playfair Display',serif;color:var(--gold);font-size:13px;margin-top:3px;font-style:italic">Centro de Comando · 2026</div>
  <div class="hero-meta">28 Sep – 9 Oct · 4 Viajeros · Iberia IB0380</div>
  <div class="chips">
    <div class="chip">LB8T8</div>
    <div class="chip">SJU Terminal C</div>
    <div class="chip">MAD Terminal 4S</div>
    <div class="chip">IB0380 · 8:25 PM</div>
    <div class="chip storage-badge"><span class="storage-dot"></span>Memoria Local Activa</div>
  </div>
</div>

<div class="tabs">
  <button class="tb on" onclick="tab('agenda',this)">🗓 Agenda</button>
  <button class="tb" onclick="tab('logistica',this)">✈️ Logística</button>
  <button class="tb" onclick="tab('gastos',this)">💶 Gastos</button>
  <button class
