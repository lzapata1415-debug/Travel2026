<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madrid · Barcelona 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --red:#AA151B; --red-soft:rgba(170,21,27,0.12);
  --gold:#F1BF00; --gold-dark:#C49A00; --gold-soft:rgba(241,191,0,0.15);
  --cream:#FFFFFF; --card:#FFFFFF;
  --dark:#1A1208; --dark2:#2D2010; --dark3:#3D2E18;
  --muted:#8C7355; --border:rgba(170,21,27,0.15);
  --shadow:0 4px 20px rgba(0,0,0,0.06);
  --radius:16px; --tab-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}
.hero{background:var(--dark);padding:24px 16px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--red) 50%,var(--gold) 50%)}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);font-weight:900;color:#fff;letter-spacing:-0.5px}
.hero h1 span{color:var(--gold)}
.hero-meta{color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.5px}
.tabs{display:flex;overflow-x:auto;background:var(--dark2);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:200;scrollbar-width:none}
.tb{flex:0 0 auto;padding:0 16px;height:var(--tab-h);font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.tb.on{color:var(--gold);border-bottom-color:var(--gold)}
.sec{display:none;padding:18px 14px 90px;max-width:820px;margin:0 auto}
.sec.on{display:block}
.stitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:1px}
.day{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.dh{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;background:linear-gradient(135deg,var(--dark),var(--dark2))}
.dnum{background:var(--gold);color:var(--dark);font-family:'Playfair Display',serif;font-weight:700;font-size:16px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.di{flex:1;min-width:0;color:#fff}
.dtitle{font-size:14px;font-weight:600}
.dbody{display:none;padding:14px}
.day.open .dbody{display:block}
.act{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.atime{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:44px}
.acont{flex:1;font-size:13px}
.mb{display:inline-flex;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;text-decoration:none;margin-top:5px}
.mb-r{background:var(--red);color:#fff}
.icard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
.icard h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--red);margin-bottom:10px}
.irow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px}
.fg input, .fg select{width:100%;padding:9px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.btn-p{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer}
.res{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;padding-left:20px}
.res::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.res-r::before{background:var(--red)}
.ai-wrap{display:flex;flex-direction:column;height:450px}
.ai-messages{flex:1;overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:10px 14px;border-radius:15px;font-size:13px}
.msg-user{background:var(--dark);color:#fff;align-self:flex-end}
.msg-ai{background:var(--card);border:1px solid var(--border);align-self:flex-start}
.ai-input-row{display:flex;gap:8px;margin-top:10px}
.ai-input{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;resize:none}
.ai-send{padding:10px 15px;background:var(--red);color:#fff;border:none;border-radius:10px;cursor:pointer}
.chip{background:rgba(241,191,0,0.1);border:1px solid var(--gold);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--gold-dark)}
</style>
</head>
<body>
<div class="hero">
  <h1>Madrid · <span>Barcelona</span></h1>
  <div class="hero-meta">28 Sep – 9 Oct 2026 · 4 Viajeros</div>
  <div style="display:flex;gap:5px;justify-content:center;margin-top:10px">
    <div class="chip">LB8T8</div><div class="chip">Memoria Local Activa</div>
  </div>
</div>
<div class="tabs">
  <button class="tb on" onclick="tab('agenda',this)">🗓 Agenda</button>
  <button class="tb" onclick="tab('logistica',this)">✈️ Logística</button>
  <button class="tb" onclick="tab('gastos',this)">💶 Gastos</button>
  <button class="tb" onclick="tab('ai',this)">🤖 Asistente IA</button>
</div>
<div id="sec-agenda" class="sec on"><div class="stitle">🗓 Itinerario</div><div id="agenda-root"></div></div>
<div id="sec-logistica" class="sec">
  <div class="stitle">✈️ Vuelo Ida</div>
  <div class="icard"><h3>IB0380 — SJU → MAD</h3><div class="irow"><span>Salida</span><span style="font-weight:700">8:25 PM · Sep 28</span></div><div class="irow"><span>Reserva</span><span style="font-weight:700;color:var(--red)">LB8T8</span></div></div>
</div>
<div id="sec-gastos" class="sec">
  <div class="stitle">💶 Gastos</div>
  <div class="fcard">
    <div class="fg"><label>Descripción</label><input type="text" id="exp-desc"></div>
    <div class="fg"><label>Monto</label><input type="number" id="exp-amt"></div>
    <button class="btn-p" onclick="addExp()">+ Guardar Gasto</button>
  </div>
  <div id="exp-list"></div>
</div>
<div id="sec-ai" class="sec">
  <div class="stitle">🤖 Asistente IA</div>
  <div class="ai-wrap">
    <div class="ai-messages" id="ai-msgs"><div class="msg msg-ai">¡Hola! Soy tu guía para España 2026. ¿En qué te ayudo hoy?</div></div>
    <div class="ai-input-row">
      <textarea class="ai-input" id="ai-input" placeholder="Pregúntame algo..."></textarea>
      <button class="ai-send" onclick="sendAI()">➤</button>
    </div>
  </div>
</div>
<script>
const SYSTEM_PROMPT = `Eres el asistente de viaje para el grupo Madrid-Barcelona 2026. 
ITINERARIO: 28 Sep (Vuelo SJU 8:25PM), 29 Sep (Llegada MAD 10:25AM, Free Tour 3:30PM), 30 Sep (Tour Austrias), 1 Oct (Escorial, Bernabéu), 2 Oct (Cepa 21 Pisado Uvas, Prado), 3 Oct (AVE a Barcelona), 4 Oct (Sagrada Família), 5 Oct (Parque Güell, Flamenco), 6 Oct (Montserrat, Codorníu), 7 Oct (Girona), 8 Oct (Francia), 9 Oct (Regreso).
VUELO: IB0380, Código LB8T8. 
PRESUPUESTO: $4,173 p/p. 
Responde siempre amigable y en español.`;

let days = [], expenses = [], chatHistory = [];
async function loadData() {
  const d = localStorage.getItem('v2026_agenda-days');
  days = d ? JSON.parse(d) : [{id:1,date:'29 Sep',title:'Llegada Madrid',activities:[{time:'10:25',title:'Llegada MAD',note:'Check-in AirBnB'}]}];
  expenses = JSON.parse(localStorage.getItem('v2026_expenses') || '[]');
  chatHistory = JSON.parse(localStorage.getItem('v2026_chat-history') || '[]');
  renderAgenda(); renderExp();
}

function tab(id, btn) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  btn.classList.add('on');
}

function renderAgenda() {
  document.getElementById('agenda-root').innerHTML = days.map(d => `
    <div class="day open">
      <div class="dh">
        <div class="dnum">${d.id}</div>
        <div class="di"><div class="dtitle">${d.date} · ${d.title}</div></div>
      </div>
      <div class="dbody">${d.activities.map(a => `<div class="act"><div class="atime">${a.time}</div><div class="acont"><b>${a.title}</b><br>${a.note}</div></div>`).join('')}</div>
    </div>`).join('');
}

async function sendAI() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim(); if(!msg) return;
  input.value = ''; addMsg(msg, 'user');
  
  chatHistory.push({role:'user', parts:[{text: msg}]});
  let key = localStorage.getItem('v2026_gemini_key');
  if(!key) {
    key = prompt("Pega tu API Key de Gemini:");
    if(key) localStorage.setItem('v2026_gemini_key', key); else return;
  }

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: chatHistory
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const reply = data.candidates[0].content.parts[0].text;
    addMsg(reply, 'ai');
    chatHistory.push({role:'model', parts:[{text: reply}]});
    localStorage.setItem('v2026_chat-history', JSON.stringify(chatHistory.slice(-10)));
  } catch(e) {
    console.error(e);
    addMsg("❌ Error de conexión. Verifica tu API Key o intenta de nuevo.", 'ai');
  }
}

function addMsg(t, r) {
  const d = document.createElement('div');
  d.className = `msg msg-${r}`;
  d.innerHTML = t.replace(/\n/g, '<br>');
  document.getElementById('ai-msgs').appendChild(d);
  document.getElementById('ai-msgs').scrollTop = 9999;
}

window.onload = loadData;
</script>
</body>
</html>
