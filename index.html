<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>España 2026 | Centro de Comando Elite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        :root {
            --red-espana: #C60B1E; --red-dark: #8E0815; --gold-espana: #F1BF00; --gold-dark: #C49A00;
            --gold-soft: rgba(241,191,0,0.25); --dark-deep: #1A1208; --cream-bg: #FDF8F0; --white: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--cream-bg); color: var(--dark-deep); line-height: 1.6; overflow-x: hidden; }
        
        /* Hero & Nav */
        .hero-prestige { background-color: var(--dark-deep); padding: 4rem 1.5rem; text-align: center; border-bottom: 6px solid var(--gold-espana); color: var(--white); }
        .hero-prestige h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; line-height: 1.1; }
        .hero-prestige h1 span { color: var(--gold-espana); }
        .hero-meta-data { color: #d4b48d; font-size: 0.85rem; font-family: 'DM Mono', monospace; letter-spacing: 2px; text-transform: uppercase; }
        .nav-master-container { background-color: var(--dark-deep); position: sticky; top: 0; z-index: 1000; display: flex; overflow-x: auto; border-bottom: 3px solid var(--gold-espana); scrollbar-width: none; }
        .nav-master-container::-webkit-scrollbar { display: none; }
        .nav-tab { padding: 1rem 1.5rem; font-size: 0.95rem; font-weight: 700; color: #d4b48d; background: transparent; border: none; cursor: pointer; text-transform: uppercase; white-space: nowrap; transition: 0.3s; }
        .nav-tab.active { color: var(--dark-deep); background-color: var(--gold-espana); }

        /* Layout & Cards */
        .module-section { display: none; padding: 2rem 1.5rem; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        .module-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card-prestige { background-color: var(--white); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 1.5rem; border: 1px solid #eaeaea; }
        .title-prestige { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--red-espana); margin-bottom: 1.5rem; border-bottom: 2px solid var(--gold-soft); padding-bottom: 0.5rem; }

        /* Forms & Buttons */
        .form-prestige-group { margin-bottom: 1.2rem; }
        .form-prestige-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #8c7355; text-transform: uppercase; margin-bottom: 0.5rem; }
        .form-prestige-group input, .form-prestige-group select, .form-prestige-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit; }
        .btn-master-action { width: 100%; padding: 1rem; background-color: var(--red-espana); color: var(--white); border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; text-align: center; display: inline-block; }
        .btn-master-action:hover { background-color: var(--red-dark); }

        /* Accordion Agenda */
        .day-container { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 1rem; background: var(--white); overflow: hidden; }
        .day-header { padding: 1rem 1.5rem; background-color: var(--dark-deep); color: var(--white); cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; }
        .day-body { display: none; padding: 1rem 1.5rem; }
        .day-container.open .day-body { display: block; }
        .act-prestige-row { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .act-time-mono { font-family: 'DM Mono', monospace; color: var(--gold-dark); font-weight: 700; min-width: 60px; }
        .btn-maps-prestige { display: inline-block; background-color: var(--gold-espana); color: var(--dark-deep); padding: 0.3rem 0.8rem; border-radius: 6px; text-decoration: none; font-size: 0.8rem; font-weight: 700; margin-top: 0.3rem; }

        /* Splitwise */
        .splitwise-summary-box { background-color: #f0fdf4; border: 2px solid #16a34a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .debt-item-display { background-color: var(--white); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; border-left: 4px solid var(--red-espana); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Chat IA */
        .chat-elite-box { height: 350px; overflow-y: auto; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .msg-prestige { margin-bottom: 1rem; padding: 0.8rem 1rem; border-radius: 12px; max-width: 85%; font-size: 0.95rem; }
        .msg-user { background-color: var(--dark-deep); color: var(--white); margin-left: auto; border-bottom-right-radius: 0; }
        .msg-ai { background-color: var(--gold-soft); color: var(--dark-deep); border-bottom-left-radius: 0; border: 1px solid var(--gold-espana); }

        .toast-system { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background-color: var(--dark-deep); color: var(--white); padding: 1rem 2rem; border-radius: 30px; font-weight: 700; display: none; z-index: 9999; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .chart-wrapper { position: relative; height: 300px; width: 100%; margin-bottom: 2rem; }
    </style>
</head>
<body>

<header class="hero-prestige">
    <h1>Madrid · <span>Barcelona</span> 2026</h1>
    <span class="hero-meta-data">IBERIA IB0380 | LOC: LB8T8 | 28 SEP - 09 OCT</span>
</header>

<nav class="nav-master-container">
    <button class="nav-tab active" onclick="loadModule('agenda', this)">🗓 Agenda</button>
    <button class="nav-tab" onclick="loadModule('logistica', this)">✈️ Logística</button>
    <button class="nav-tab" onclick="loadModule('gastos', this)">💶 Gastos</button>
    <button class="nav-tab" onclick="loadModule('recibos', this)">📸 Recibos</button>
    <button class="nav-tab" onclick="loadModule('dashboard', this)">📊 Dashboard</button>
    <button class="nav-tab" onclick="loadModule('pendientes', this)">📋 Tareas</button>
    <button class="nav-tab" onclick="loadModule('viajeros', this)">👥 Viajeros</button>
    <button class="nav-tab" onclick="loadModule('ai', this)">🤖 Asistente</button>
</nav>

<main id="section-agenda" class="module-section active">
    <div class="title-prestige">Cronograma Maestro</div>
    <div id="render-agenda-full"></div>
    <div class="card-prestige" style="margin-top: 2rem;">
        <h3 style="margin-bottom: 1rem;">📍 Añadir Actividad</h3>
        <div class="form-prestige-group"><label>Día</label><select id="target-day-select"></select></div>
        <div class="form-prestige-group"><label>Hora</label><input type="time" id="target-time-input"></div>
        <div class="form-prestige-group"><label>Evento</label><input type="text" id="target-title-input" placeholder="Ej: Cena Gala"></div>
        <div class="form-prestige-group"><label>Ubicación</label><input type="text" id="target-map-input" placeholder="Lugar exacto"></div>
        <button class="btn-master-action" id="action-push-activity">Guardar Actividad</button>
    </div>
</main>

<section id="section-logistica" class="module-section">
    <div class="title-prestige">Vuelos, Airbnb y AVE</div>
    <div class="card-prestige">
        <div class="form-prestige-group"><label>Categoría</label><input type="text" id="log-type-master" placeholder="Ej: Vuelo Iberia"></div>
        <div class="form-prestige-group"><label>Detalles</label><textarea id="log-data-master" rows="4"></textarea></div>
        <button class="btn-master-action" id="action-push-log">Guardar Registro</button>
    </div>
    <div id="render-log-wall"></div>
</section>

<section id="section-gastos" class="module-section">
    <div class="title-prestige">Splitwise: Balances</div>
    <div class="splitwise-summary-box">
        <h3 style="color: #166534; margin-bottom: 1rem;">🟢 SALDOS ACTUALES</h3>
        <div id="render-splitwise-engine"></div>
        <button class="btn-master-action" style="background-color: #166534; margin-top: 1rem;" id="action-push-export">⬇️ Exportar CSV</button>
    </div>
    <div class="card-prestige" style="border-color: #dc2626;">
        <h3 style="color: #b91c1c; margin-bottom: 1rem;">💸 LIQUIDAR DEUDA</h3>
        <div class="form-prestige-group"><label>Paga</label><select id="settle-from-select" class="traveler-options"></select></div>
        <div class="form-prestige-group"><label>Recibe</label><select id="settle-to-select" class="traveler-options"></select></div>
        <div class="form-prestige-group"><label>Monto (€)</label><input type="number" id="settle-amt-val" step="0.01"></div>
        <button class="btn-master-action" style="background-color: #dc2626;" id="action-push-settle">Confirmar Abono</button>
    </div>
    <div class="card-prestige">
        <h3 style="margin-bottom: 1rem;">➕ NUEVO GASTO</h3>
        <div class="form-prestige-group"><label>Concepto</label><input type="text" id="exp-title-input"></div>
        <div class="form-prestige-group"><label>Monto (€)</label><input type="number" id="exp-amt-input" step="0.01"></div>
        <div class="form-prestige-group"><label>Pagador</label><select id="exp-payer-select" class="traveler-options"></select></div>
        <div class="form-prestige-group">
            <label>Categoría</label>
            <select id="exp-cat-select">
                <option>Comida/Tapeo</option><option>Transporte/AVE</option><option>Hospedaje</option><option>Tours/Museos</option><option>Bodega/Vinos</option>
            </select>
        </div>
        <button class="btn-master-action" id="action-push-expense">Guardar Gasto</button>
    </div>
    <div id="render-expense-history"></div>
</section>

<section id="section-recibos" class="module-section">
    <div class="title-prestige">Evidencia Digital</div>
    <div class="card-prestige">
        <div class="form-prestige-group"><label>Lugar</label><input type="text" id="rec-place-master"></div>
        <div class="form-prestige-group"><label>Monto (€)</label><input type="number" id="rec-val-master" step="0.01"></div>
        <div class="form-prestige-group"><label>Pagador</label><select id="rec-who-master" class="traveler-options"></select></div>
        <label class="btn-master-action" style="cursor:pointer;">
            + Subir Ticket
            <input type="file" id="rec-file-master" accept="image/*" style="display:none">
        </label>
    </div>
    <div id="render-receipt-grid"></div>
</section>

<section id="section-dashboard" class="module-section">
    <div class="title-prestige">Anal
